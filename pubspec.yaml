name: job_connect
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0
  supabase_flutter: ^2.5.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.0
  cached_network_image: ^3.3.0
  file_picker: ^8.0.0
  flutter_svg: ^2.0.0
  intl: ^0.19.0
  equatable: ^2.0.5
  image_picker: ^1.0.0
  pdf: ^3.11.1
  printing: ^5.14.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^17.0.0
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  marionette_flutter: ^0.5.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 800
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 500
    - family: Lora
      fonts:
        - asset: assets/fonts/lora/Lora-Variable.ttf
          weight: 400
        - asset: assets/fonts/lora/Lora-Variable.ttf
          weight: 500
        - asset: assets/fonts/lora/Lora-Variable.ttf
          weight: 600
        - asset: assets/fonts/lora/Lora-Variable.ttf
          weight: 700
        - asset: assets/fonts/lora/Lora-Italic-Variable.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/lora/Lora-Italic-Variable.ttf
          style: italic
          weight: 600
    # SpaceGrotesk retained until no references remain (removed in UI-11+).
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
          weight: 500
        - asset: assets/fonts/space_grotesk/SpaceGrotesk-Variable.ttf
          weight: 700
